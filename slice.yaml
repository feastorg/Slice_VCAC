schema_version: "1.0"

# ── Identity ──────────────────────────────────────────────────────────────────
id: "slice-vcac"
name: "AC Voltage and Current Sensor"
status: "concept"
category: "sensing"

summary: "Isolated AC voltage (ZMPT101B) and non-invasive current (SCT-013) measurement slice."
description: null

# ── Versioning ────────────────────────────────────────────────────────────────
version:
  hardware: "0.1.0"
  firmware: null
  manifest: "0.1.0"

# ── Compatibility ─────────────────────────────────────────────────────────────
compatibility:
  slice_spec: ">=0.1.0 <0.2.0"
  crumbs_protocol: null
  anolis_provider_api: null

# ── Hardware ──────────────────────────────────────────────────────────────────
hardware:
  mcu:
    type: "dev-board-socket"
    form_factor: "nano"
    primary: "ATmega328P"
    supported:
      - "ATmega328P"
  primary_ic:
    manufacturer: "ZeMing"
    part_number: "ZMPT101B"
  hw_gen_current: 1
  hw_gen_supported: [1]
  pcb:
    layers: 2
    thickness: "1.6mm"
    copper_weight: "1oz"
    dimensions: "70mm x 100mm"
  connectors:
    - ref: "J1"
      type: "slice-bus-10pin"
      purpose: "power-and-i2c"
  mounting:
    pattern: "slice-standard-v0"
    hole_size: "M3"
    inset: "5mm"
  pcb_color_prototype: null
  pcb_color_production: null
  enclosure:
    supported: false
    path: null

# ── Electrical ────────────────────────────────────────────────────────────────
electrical:
  input_voltage: "12V"
  logic_voltage: "5V"
  max_current: null
  protection: null
  isolation:
    present: true

# ── Interfaces ────────────────────────────────────────────────────────────────
interfaces:
  host:
    type: "i2c"
    address_default: null
    address_configurable: false
  data:
    inputs:
      - name: "AC_VOLTAGE"
        type: "transformer-isolated"
      - name: "AC_CURRENT"
        type: "current-transformer"
    outputs: []

# ── Capabilities ──────────────────────────────────────────────────────────────
capabilities:
  - id: "ac_voltage_measurement"
    channels: 1
    control_modes: []
  - id: "ac_current_measurement"
    channels: 1
    control_modes: []

# ── Firmware ──────────────────────────────────────────────────────────────────
firmware: null

# ── Protocol ──────────────────────────────────────────────────────────────────
protocol: null

# ── Software ──────────────────────────────────────────────────────────────────
software: null

# ── Artifacts ─────────────────────────────────────────────────────────────────
artifacts:
  schematic: "hardware/BREAD_Slice.kicad_sch"
  pcb: "hardware/BREAD_Slice.kicad_pcb"
  firmware: null
  docs: null
  bom: "documentation/BOM_TEMP.ods"
  gerbers: null
  pick_and_place: null
  datasheets:
    - "documentation/ZMPT101B.pdf"
    - "documentation/SCT013-005.PDF"
    - "documentation/SCT-013.PDF"
    - "documentation/ZMCT103C-ZeMing.pdf"
    - "documentation/ZMCT103D-ZeMing.pdf"

# ── Manufacturing ─────────────────────────────────────────────────────────────
manufacturing: null

# ── Validation ────────────────────────────────────────────────────────────────
validation: null

# ── Safety ────────────────────────────────────────────────────────────────────
safety:
  hazards:
    - "Mains AC voltage on input side"
  max_safe_voltage: "240VAC"
  intended_environment: "lab"
  not_for:
    - "human safety critical systems"

# ── Dependencies ──────────────────────────────────────────────────────────────
dependencies: null

# ── Relations ─────────────────────────────────────────────────────────────────
related:
  supersedes: null
  superseded_by: null
  variants: []
  compatible_slices:
    - "slice-vcdc"

# ── Maintainers ───────────────────────────────────────────────────────────────
maintainers:
  - name: "Cameron Brooks"
    role: "owner"

# ── License ───────────────────────────────────────────────────────────────────
license:
  hardware: "CERN-OHL-S-2.0"
  firmware: null
  software: null
  docs: "CC-BY-4.0"

# ── Repository ────────────────────────────────────────────────────────────────
repository:
  url: "https://github.com/feastorg/Slice_VCAC"

# ── Metadata ──────────────────────────────────────────────────────────────────
metadata:
  created: "2026-05-19"
  updated: "2026-05-19"
  tags:
    - "power-monitoring"
    - "ac-voltage"
    - "ac-current"
    - "energy-monitoring"
    - "isolation"
